services:
  vps2-backup:
    build: .
    restart: unless-stopped
    environment:
      BACKUP_DIR: /data/backups
      BACKUP_RETENCAO: ${BACKUP_RETENCAO:-30}
      TARGETS: ${TARGETS:-zitadel:zitadel-db:zitadel:postgres,coolify:coolify-db:coolify:coolify}
      RCLONE_REMOTE: ${RCLONE_REMOTE}
      RCLONE_CONFIG_B2_TYPE: b2
      RCLONE_CONFIG_B2_ACCOUNT: ${RCLONE_CONFIG_B2_ACCOUNT}
      RCLONE_CONFIG_B2_KEY: ${RCLONE_CONFIG_B2_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - backup_data:/data/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  backup_data:
